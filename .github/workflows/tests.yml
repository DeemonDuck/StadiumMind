name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Testing across 3.10-3.12 validates the `from __future__ import
        # annotations` compatibility fix for the `dict | None` style type
        # hints used in a few modules. Python 3.9 was dropped from this
        # matrix because streamlit>=1.51.0 requires Python >=3.10, so 3.9
        # can no longer actually run this app regardless of our own code.
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run test suite
        run: pytest tests/ -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Matches Streamlit Community Cloud's actual deploy runtime
          # (see BUILD_LOG.md bug #3) - lint/type-check run once here,
          # not matrixed, since they check code shape, not runtime behavior.
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Ruff (lint + import order)
        run: ruff check .

      - name: Mypy (type check)
        run: mypy .